<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Jamie Tan</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #FFFFFF;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  }

  .page-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
  }

  .photo-circle {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background-image: url('https://jying2830-cmd.github.io/mylink/IMG_1513.jpeg');
    background-size: cover;
    background-position: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 6px 24px rgba(0,0,0,0.12);
    border: 3px solid #FFFFFF;
    transition: transform 0.15s ease;
  }

  .photo-circle:active {
    transform: scale(0.94);
  }

  .name-text {
    color: #1A1A1A;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 1.5px;
    margin-top: 4px;
  }

  .subtext {
    color: #9A9A9A;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
    margin-top: -10px;
  }
</style>
</head>
<body>

<div class="page-wrap">
  <div class="photo-circle" id="photoBtn"></div>
  <div class="name-text">JAMIE TAN</div>
  <div class="subtext">tap to continue</div>
</div>

<script>
  const DESTINATION_URL = atob("aHR0cHM6Ly9iZWFjb25zLmFpL2phYW1pZXRhbg==");

  function isInAppBrowser() {
    const ua = navigator.userAgent || '';
    return /FBAN|FBAV|Instagram|Line\/|MicroMessenger|TikTok|Snapchat/i.test(ua);
  }

  function goToDestination() {
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    if (isInAppBrowser() && isIOS) {
      // Try to force open destination directly in Safari
      window.location = 'x-safari-' + DESTINATION_URL;
      setTimeout(() => { window.location = DESTINATION_URL; }, 400);
    } else {
      window.location = DESTINATION_URL;
    }
  }

  document.getElementById('photoBtn').addEventListener('click', goToDestination);
</script>

</body>
</html>
